<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Now, Here</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4;">

<!-- 메일 전체를 감싸는 테이블 -->
<table style="padding: 20px 0; margin: 0 auto; text-align: center;">
    <tr>
        <td>
            <table style="max-width: 600px; background-color: #ffffff; border-radius: 8px; text-align: left; margin: 0 auto; padding: 20px;">
                <tr>
                    <td style="padding: 20px; text-align: left;">
                        <!-- 로고 이미지 -->
                        <img src="https://api.now-here.site/images/logo.png" alt="Now Here Logo" style="max-width: 100px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto;">

                        <!-- 헤더 -->
                        <h1 style="font-size: 24px; color: #333;">문의하신 내용에 답변드립니다.</h1>
                        <p>안녕하세요, <span style="color: #D55BAD; font-weight: bold;">"나우히어 팀"</span>입니다.</p>
                        <p>먼저, 서비스 이용 중에 불편함을 드려 죄송합니다.</p>

                        <!-- 문의 사항 -->
                        <p style="font-size: 14px; color: #888888; margin-bottom: 10px;">문의사항</p>
                        <p th:text="${inquiry}" style="font-size: 14px; padding: 10px; background-color: #f9f9f9; border-left: 4px solid #D55BAD;">이전에 보냈던 문의사항 내용입니다.</p>

                        <!-- 답변 -->
                        <p style="font-size: 16px; margin-bottom: 10px;">답변</p>
                        <p th:text="${answer}" style="font-size: 14px; padding: 10px; background-color: #ffffff; border-left: 4px solid #D55BAD; font-weight: bold;">답변 내용입니다.</p>
                    </td>
                </tr>

                <!-- 푸터 -->
                <tr>
                    <td style="padding: 20px; border-top: 1px solid #dddddd; font-size: 14px; color: #777777;">
                        <p><strong>"Now, here"</strong> 를 이용해주셔서 정말 감사드리며, 남은 축제 기간도 저희 서비스와 함께 즐거운 시간 보내시길 바랍니다. :)</p>
                        <p>문의 사항이 있으시면 언제든지 나우히어 문의 페이지나 <a href="mailto:now.here.linker@gmail.com" style="color: #D55BAD; text-decoration: none;">now.here.linker@gmail.com</a>으로 연락해 주세요.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>

</body>
</html>
