<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trueEcho</title>
    <!-- Google Fonts (Poppins) 불러오기 -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body style="font-family: 'Poppins', sans-serif; background-color: #f4f4f4; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh;">

<div style="max-width: 600px; width: 100%; padding: 40px; background-color: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1); text-align: left;">

    <header style="text-align: center; margin-bottom: 40px;">

        <img src="https://api.now-here.site/images/logo.png" alt="Now, here Logo" style="width: 50%; margin-bottom: 20px;">
        <h1 style="font-size: 28px; font-weight: bold; color: #333; margin-bottom: 10px;">
            문의하신 내용에 답변드립니다.‍🙇‍♀️🙇
        </h1>

    </header>

    <div style="font-size: 18px; color: #555; margin-top: 20px;">
        <p>안녕하세요🙌, <span style="color: #D55BAD; font-weight: bold;">나우히어 팀🧙</span>입니다.</p>
        <p>먼저, 서비스 이용 중에 불편함을 드려 죄송합니다.</p>
        <br>

        <div>
            <p>문의사항 :</p>
            <blockquote style="color: #888; font-style: italic; background-color: #f9f9f9; padding: 10px 15px; border-left: 4px solid #D55BAD; margin: 0; font-size: 14px;">
                <!-- 이전 문의사항 내용 주입 -->
                <span th:text="${inquiry}">이전에 보냈던 문의사항 내용입니다.</span>
            </blockquote>

            <br>
            <p>답변 :</p>
            <blockquote style="color: #ffffff; font-style: italic; padding: 10px 15px; border-left: 4px solid #D55BAD; margin: 0; font-size: 14px;">
                <strong style="font-weight: bold; color: #333;" th:text="${answer}">답변 내용입니다.</strong>
            </blockquote>
        </div>
    </div>

    <div style="margin-top: 40px; font-size: 14px; color: #777; text-align: left; padding: 20px 0;">
        <p><strong style="color: #D55BAD; font-weight: bold;">"Now, here"</strong> 를 이용해주셔서 정말 감사드리며, 남은 축제 기간도 저희 서비스와 즐거운 시간 보내시길 바랍니다. :)</p>
    </div>

</div>

</body>
</html>
