<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Now, Here</title>
    <style>
        /* 기본 스타일 */
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        h1 {
            font-size: 28px;
            font-weight: bold;
            color: #333333;
            text-align: center;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            line-height: 1.5;
            color: #555555;
            margin-bottom: 20px;
        }

        .inquiry, .answer {
            padding: 10px 15px;
            border-left: 4px solid #D55BAD;
            margin-bottom: 20px;
            font-size: 16px;
            font-style: italic;
        }

        .inquiry {
            background-color: #f9f9f9;
            color: #888888;
        }

        .answer {
            background-color: #f4f4f4;
            color: #333333;
            font-weight: bold;
        }

        .footer {
            font-size: 14px;
            color: #777777;
            border-top: 1px solid #dddddd;
            padding-top: 20px;
            text-align: left;
        }

        .footer strong {
            color: #D55BAD;
        }

        /* 작은 스마트폰 (최소 너비 320px) */
        @media only screen and (max-width: 320px) {
            h1 {
                font-size: 18px;
            }
            p, .inquiry, .answer {
                font-size: 12px;
            }
        }

        /* 일반적인 스마트폰 (최대 너비 375px) */
        @media only screen and (min-width: 321px) and (max-width: 375px) {
            h1 {
                font-size: 20px;
            }
            p, .inquiry, .answer {
                font-size: 14px;
            }
        }

        /* 큰 스마트폰 (최대 너비 428px) */
        @media only screen and (min-width: 376px) and (max-width: 428px) {
            h1 {
                font-size: 22px;
            }
            p, .inquiry, .answer {
                font-size: 16px;
            }
        }

        /* 태블릿 */
        @media only screen and (min-width: 429px) and (max-width: 1024px) {
            h1 {
                font-size: 26px;
            }
            p, .inquiry, .answer {
                font-size: 16px;
            }
        }

        /* 데스크탑 */
        @media only screen and (min-width: 1025px) and (max-width: 1920px) {
            h1 {
                font-size: 28px;
            }
            p, .inquiry, .answer {
                font-size: 18px;
            }
        }

        /* TV */
        @media only screen and (min-width: 1921px) {
            h1 {
                font-size: 32px;
            }
            p, .inquiry, .answer {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<!-- 메일 전체를 감싸는 테이블 -->
<table role="presentation" bgcolor="#f4f4f4">
    <tr>
        <td align="center" style="padding: 20px 0;">
            <table role="presentation" bgcolor="#ffffff"
                   style="max-width: 600px; width: 100%; background-color: #ffffff; border-radius: 8px; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);">
                <tr>
                    <td style="padding: 20px;">

                        <!-- 헤더 -->
                        <h1>문의하신 내용에 답변드립니다.‍🙇‍♀️🙇</h1>
                        <p>안녕하세요🙌, <span style="color: #D55BAD; font-weight: bold;">나우히어 팀🧙</span>입니다.</p>
                        <p>먼저, 서비스 이용 중에 불편함을 드려 죄송합니다.🙇</p>

                        <!-- 문의 사항 -->
                        <p>문의사항 : </p>
                        <div class="inquiry">
                            <p th:text="${inquiry}">이전에 보냈던 문의사항 내용입니다.</p>
                        </div>

                        <!-- 답변 -->
                        <p>답변 : </p>
                        <div class="answer">
                            <p th:text="${answer}">답변 내용입니다.</p>
                        </div>

                    </td>
                </tr>

                <!-- 푸터 -->
                <tr>
                    <td class="footer">
                        <p><strong>"Now, here"</strong> 를 이용해주셔서 정말 감사드리며, 남은 축제 기간도 저희 서비스와 즐거운 시간 보내시길 바랍니다. :)</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>

</body>
</html>
