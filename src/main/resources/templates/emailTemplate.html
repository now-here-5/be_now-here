<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>trueEcho</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            max-width: 400px;
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .logo {
            width: 120px;
            margin-bottom: 20px;
        }

        h1 {
            color: #4CAF50;
            margin-bottom: 20px;
            font-size: 24px;
        }

        p {
            margin-bottom: 15px;
            font-size: 16px;
            line-height: 1.5;
        }

        strong {
            font-weight: bold;
            color: #333;
            font-size: 18px;
        }
    </style>
</head>
<body>
<div class="container">

    <!-- 로고 이미지 절대 경로로 사용 -->
    <img src="https://your-domain.com/images/logo.png" alt="Now, here Logo" style="width: 100%; margin-bottom: 20px;">

    <h1 th:text="${title}">이메일 제목</h1> <!-- 타이틀 동적 처리 -->

    <div style="font-size: 18px; color: #555; margin-top: 20px;">
        <!-- 인증 코드일 경우 -->
        <div th:if="${emailType == 'CODE'}">
            <p>Now, here에서 <strong>인증코드</strong>를 발송했습니다.</p>
            <p>인증코드를 입력해주세요 👉:</p>
            <strong th:text="${code}"></strong> <!-- 동적으로 코드 삽입 -->
        </div>

        <!-- 문의사항일 경우 -->
        <div th:if="${emailType == 'INQUIRY'}">
            <p>이전에 문의하신 사항에 대해 답변 드립니다.!</p>
            <p>이전 문의사항👉: <strong th:text="${inquiry}"></strong></p>
            <br><br>
            <strong th:text="${answer}"></strong> <!-- 동적으로 답변 삽입 -->
        </div>
    </div>

</div>

</body>
</html>
