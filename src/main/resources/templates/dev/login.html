<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh; /* 화면 전체 높이 */
            margin: 0;
            background-color: #f4f4f4; /* 배경색 */
        }
        .container {
            background-color: #fff; /* 카드 배경색 */
            padding: 20px;
            border-radius: 8px; /* 둥근 모서리 */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); /* 그림자 효과 */
            width: 300px; /* 카드 너비 */
        }
        h2 {
            text-align: center; /* 제목 가운데 정렬 */
            color: #333; /* 제목 색상 */
        }
        label {
            display: block;
            margin-bottom: 5px; /* 레이블과 입력 사이 여백 */
            color: #555; /* 레이블 색상 */
        }
        input[type="text"], input[type="password"] {
            width: 100%; /* 입력 필드 너비 */
            padding: 10px; /* 입력 필드 패딩 */
            margin-bottom: 15px; /* 입력 필드 아래 여백 */
            border: 1px solid #ddd; /* 테두리 */
            border-radius: 4px; /* 둥근 모서리 */
        }
        button {
            width: 100%; /* 버튼 너비 */
            padding: 10px; /* 버튼 패딩 */
            background-color: #007bff; /* 버튼 배경색 */
            border: none; /* 테두리 없음 */
            color: white; /* 버튼 글자색 */
            border-radius: 4px; /* 둥근 모서리 */
            cursor: pointer; /* 커서 포인터 */
        }
        button:hover {
            background-color: #0056b3; /* 버튼 호버 색상 */
        }
        .error-message {
            color: red; /* 오류 메시지 색상 */
            text-align: center; /* 가운데 정렬 */
            margin-top: 10px; /* 여백 */
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Admin Login</h2>
    <form id="loginForm">
        <div>
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Login</button>
        <div>
            <p class="error-message">[[${error}]]</p>  <!-- 로그인 실패 시 메시지 표시 -->
        </div>
    </form>
</div>

<script>
    document.getElementById('loginForm').onsubmit = async function(event) {
        event.preventDefault(); // 기본 폼 제출 방지

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        const response = await fetch('/dev/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ phoneNumber: username, password: password })
        });

        if (response.ok) {
            // 개발자 페이지 나중에
        } else {
            const errorText = await response.text();
            document.querySelector('.error-message').innerText = errorText; // 오류 메시지 표시
        }
    };
</script>
</body>
</html>
