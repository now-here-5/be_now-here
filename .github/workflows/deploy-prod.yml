name: Build and Deploy Spring Boot to OCI using Docker Compose

on:
  push:
    branches:
      - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout code
        uses: actions/checkout@v2

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 3. Cache Docker layers
      - name: Cache Docker layers
        uses: actions/cache@v2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-

      # 4. Log in to GitHub Container Registry
      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GHP_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      # 5. Build and Push Docker Images
      - name: Build and Push Docker Image
        run: |
          docker buildx build --cache-from type=local,src=/tmp/.buildx-cache \
                              --cache-to type=local,dest=/tmp/.buildx-cache \
                              -t ghcr.io/${{ github.repository }}:latest \
                              --push .

      # 6. PostgreSQL VM 접속 및 상태 확인
      - name: Check and Start PostgreSQL on Separate VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PS_VM_IP }}
          username: ${{ secrets.PS_VM_USERNAME }}
          key: ${{ secrets.PS_VM_PRIVATE_KEY }}
          script: |
            if systemctl is-active --quiet postgresql@14-main; then
              echo "PostgreSQL is already running."
            else
              echo "PostgreSQL is not running. Starting PostgreSQL..."
              sudo systemctl start postgresql
            fi

      # 7. Docker Compose 파일 복사 및 환경 변수 사용하여 배포
      - name: Deploy Application using Docker Compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USERNAME }}
          key: ${{ secrets.OCI_VM_PRIVATE_KEY }}
          script: |
            DEPLOYMENT_DIR="/home/now-here/app"
            if [ ! -d "$DEPLOYMENT_DIR" ]; then
              echo "Directory $DEPLOYMENT_DIR does not exist. Creating it."
              sudo mkdir -p "$DEPLOYMENT_DIR"
            fi

            # VM에 docker-compose.yml 파일을 복사
            echo "Copying docker-compose.yml to VM..."
            scp -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.OCI_VM_USERNAME }}@${{ secrets.OCI_VM_IP }}:${DEPLOYMENT_DIR}/docker-compose.yml

            cd "$DEPLOYMENT_DIR"

            # GitHub Actions에서 주입된 환경 변수를 이용해 Docker Compose 실행
            echo "${{ secrets.GHP_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # 환경 변수를 런타임에 주입
            DB_HOST=${{ secrets.OC_DB_PV_HOST }} \
            DB_PORT=${{ secrets.OC_DB_PORT }} \
            DB_NAME=${{ secrets.OC_DB_NAME }} \
            DB_USERNAME=${{ secrets.OC_DB_USERNAME }} \
            DB_PASSWORD=${{ secrets.OC_DB_PASSWORD }} \
            XOR_KEY=${{ secrets.XOR_KEY }} \
            SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }} \
            SLACK_INQUIRY_WEBHOOK_URL=${{ secrets.SLACK_INQUIRY_WEBHOOK_URL }} \
            MAIL_HOST=${{ secrets.MAIL_HOST }} \
            MAIL_PORT=${{ secrets.MAIL_PORT }} \
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }} \
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }} \
            TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }} \
            TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }} \
            TWILIO_TRIAL_NUMBER=${{ secrets.TWILIO_TRIAL_NUMBER }} \
            COMPARTMENT_ID=${{ secrets.COMP_ID }} \
            LOG_ID=${{ secrets.LOG_ID }} \
            OCI_CONFIG_FILE=${{ secrets.OCI_CONFIG_FILE }} \
            docker-compose -f docker-compose.yml up -d --remove-orphans

            # Show container logs for debugging
            sudo docker logs now-here-server
