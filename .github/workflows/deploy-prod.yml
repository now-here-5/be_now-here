name: Build and Deploy Spring Boot to OCI using Docker

on:
  push:
    branches:
      - prod

  pull_request:
    branches:
      - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Build Docker Image
        run: docker build -t ${{ secrets.OCIR_REPOSITORY_URL }}:latest .

      - name: Push Docker Image to OCI Registry
        run: |
          echo "${{ secrets.OCIR_AUTH_TOKEN }}" | docker login ap-chuncheon-1.ocir.io -u "${{ secrets.OCIR_USERNAME }}" --password-stdin
          docker push ${{ secrets.OCIR_REPOSITORY_URL }}:latest

      # PostgreSQL VM 접속 및 상태 확인 단계
      - name: Check and Start PostgreSQL on Separate VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PS_VM_IP }}
          username: ${{ secrets.PS_VM_USERNAME }}
          key: ${{ secrets.PS_VM_PRIVATE_KEY }}
          script: |
            # PostgreSQL 상태 확인 후 필요 시 시작
            if ! nc -z ${{ secrets.OC_DB_PV_HOST }} ${{ secrets.OC_DB_PORT }}; then
              echo "PostgreSQL is not running. Starting PostgreSQL..."
              sudo systemctl start postgresql
            else
              echo "PostgreSQL is already running."
            fi

      # 애플리케이션 VM 배포 단계
      - name: Deploy Spring Boot on OCI VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USERNAME }}
          key: ${{ secrets.OCI_VM_PRIVATE_KEY }}
          script: |
            # Set deployment directory
            DEPLOYMENT_DIR="/home/username/app"
            
            # Check if deployment directory exists, if not, create it
            if [ ! -d "$DEPLOYMENT_DIR" ]; then
              echo "Directory $DEPLOYMENT_DIR does not exist. Creating it."
              sudo mkdir -p "$DEPLOYMENT_DIR"
              sudo chown $USER:$USER "$DEPLOYMENT_DIR"
            fi
            
            # Change to the deployment directory
            cd "$DEPLOYMENT_DIR"
            
            # Log in to OCI Registry
            echo "${{ secrets.OCIR_AUTH_TOKEN }}" | docker login ap-chuncheon-1.ocir.io -u "${{ secrets.OCIR_USERNAME }}" --password-stdin
            
            # Pull the latest Docker image
            sudo docker pull ${{ secrets.OCIR_REPOSITORY_URL }}:latest
            
            # Stop and remove the existing container, if any
            sudo docker stop blinker-server || true
            sudo docker rm blinker-server || true
            
            # Run the new container with environment variables and port binding
            sudo docker run -d --name blinker-server \
              -p 8080:8080 \
              -e DB_HOST=${{ secrets.OC_DB_PV_HOST }} \
              -e DB_PORT=${{ secrets.OC_DB_PORT }} \
              -e DB_NAME=${{ secrets.OC_DB_NAME }} \
              -e DB_USERNAME=${{ secrets.OC_DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.OC_DB_PASSWORD }} \
              ${{ secrets.OCIR_REPOSITORY_URL }}:latest
