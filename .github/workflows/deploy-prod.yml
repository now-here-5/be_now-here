name: Build and Deploy Spring Boot to OCI using Docker

on:
  push:
    branches:
      - infra/24-unauthorized

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Cache Docker layers
        uses: actions/cache@v2
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Build Docker Image
        run: |
          docker buildx build --cache-from type=local,src=/tmp/.buildx-cache \
                              --cache-to type=local,dest=/tmp/.buildx-cache \
                              -t server-image:${{ github.sha }} \
                              --output type=docker,dest=server-image.tar .
          echo "::set-output name=image-sha::${{ github.sha }}"

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v3
        with:
          name: docker-image
          path: server-image.tar

  push-to-registry:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v3
        with:
          name: docker-image

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHP_TOKEN }}

      - name: Load and Push Docker Image to GitHub Container Registry
        run: |
          # Load the image from the artifact
          docker load -i server-image.tar
          # Tag and push the image
          docker tag server-image:${{ github.sha }} ghcr.io/${{ github.repository }}/server-image:${{ github.sha }}
          docker push ghcr.io/${{ github.repository }}/server-image:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v3
        with:
          name: docker-image

      - name: Check and Start PostgreSQL on Separate VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PS_VM_IP }}
          username: ${{ secrets.PS_VM_USERNAME }}
          key: ${{ secrets.PS_VM_PRIVATE_KEY }}
          script: |
            if systemctl is-active --quiet postgresql; then
              echo "PostgreSQL is already running."
            else
              echo "PostgreSQL is not running. Starting PostgreSQL..."
              sudo systemctl start postgresql
            fi

      - name: Deploy Spring Boot Application on OCI VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_VM_IP }}
          username: ${{ secrets.OCI_VM_USERNAME }}
          key: ${{ secrets.OCI_VM_PRIVATE_KEY }}
          script: |
            DEPLOYMENT_DIR="/home/username/app"
            if [ ! -d "$DEPLOYMENT_DIR" ]; then
              echo "Directory $DEPLOYMENT_DIR does not exist. Creating it."
              mkdir -p "$DEPLOYMENT_DIR"
            fi
            
            cd $DEPLOYMENT_DIR
            
            # Docker 이미지 로드
            if ! sudo docker load -i server-image.tar; then
              echo "Failed to load Docker image"
              exit 1
            fi
            
            cd "$DEPLOYMENT_DIR"
            # Verify if the Docker image file exists
            if [ ! -f "server-image.tar" ]; then
              echo "Docker image file server-image.tar not found in $DEPLOYMENT_DIR"
              exit 1
            fi
            
            
            # 컨테이너 실행
            sudo docker stop now-here-server || true
            sudo docker rm now-here-server || true
            if ! sudo docker run -d --name now-here-server -p 8080:8080 \
              -e DB_HOST=${{ secrets.OC_DB_PV_HOST }} \
              -e DB_PORT=${{ secrets.OC_DB_PORT }} \
              -e DB_NAME=${{ secrets.OC_DB_NAME }} \
              -e DB_USERNAME=${{ secrets.OC_DB_USERNAME }} \
              -e DB_PASSWORD=${{ secrets.OC_DB_PASSWORD }} \
              -e XOR_KEY=${{ secrets.XOR_KEY }} \
              -e SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }} \
              -e SLACK_INQUIRY_WEBHOOK_URL=${{ secrets.SLACK_INQUIRY_WEBHOOK_URL }} \
              server-image:${{ github.sha }}; then
              echo "Failed to run Docker container"
              exit 1
            fi
            # Show container logs for debugging
            sudo docker logs now-here-server
