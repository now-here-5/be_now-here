name: Copy Issues and PRs from Private to Public

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 00:00(자정)에 실행

  push:
    branches: 
      - public_issue_maker  

      
jobs:
  copy-issues-and-prs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Copy Issues and Pull Requests from Private to Public Repo
        env:
          GITHUB_TOKEN: ${{ secrets.GHP_TOKEN }}
          PRIVATE_REPO: 'now-here-5/be_now-here'
          PUBLIC_REPO: 'now-here-5/now-here'
        run: |
          python copy_issues_and_prs.py
